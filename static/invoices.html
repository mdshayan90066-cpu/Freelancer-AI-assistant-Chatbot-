<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoices — FreelanceAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/pages.css">
</head>

<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo"><span class="logo-icon">⚡</span><span class="logo-text">FreelanceAI</span></div>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="nav-link"><span class="nav-icon">📊</span> Dashboard</a>
            <a href="/chat" class="nav-link"><span class="nav-icon">💬</span> AI Chat</a>
            <a href="/clients" class="nav-link"><span class="nav-icon">👥</span> Clients</a>
            <a href="/payments" class="nav-link"><span class="nav-icon">💰</span> Payments</a>
            <a href="/invoices" class="nav-link active"><span class="nav-icon">📋</span> Invoices</a>
            <a href="/receipts" class="nav-link"><span class="nav-icon">🧾</span> Receipts</a>
        </nav>
        <div class="sidebar-footer" style="padding: 20px; border-top: 1px solid var(--border-color); margin-top: auto;">
            <button onclick="handleLogout()" class="btn-sm"
                style="width: 100%; background: transparent; color: var(--text-muted); border: 1px solid var(--border-color); cursor: pointer; padding: 10px; border-radius: 8px;">
                🚪 Logout
            </button>
        </div>
    </aside>
    <main class="page-content">
        <header class="page-header">
            <button class="menu-toggle"
                onclick="document.getElementById('sidebar').classList.toggle('collapsed')">☰</button>
            <h1>All Invoices</h1>
        </header>
        <div class="page-body">
            <!-- Filter Tabs -->
            <div class="filter-tabs">
                <button class="filter-tab active" onclick="filterInvoices('all', this)">All</button>
                <button class="filter-tab" onclick="filterInvoices('unpaid', this)">Unpaid</button>
                <button class="filter-tab" onclick="filterInvoices('paid', this)">Paid</button>
            </div>
            <div class="card">
                <div class="card-header">
                    <h2>Invoices (<span id="inv-count">0</span>)</h2>
                </div>
                <div class="table-wrap">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Invoice #</th>
                                <th>Client</th>
                                <th>Project</th>
                                <th>Amount</th>
                                <th>Status</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="invoices-body">
                            <tr>
                                <td colspan="7" class="empty-row">No invoices yet</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
    <script>
        let currentFilter = 'all';

        async function loadInvoices(filter) {
            const url = filter && filter !== 'all' ? `/api/invoices?status=${filter}` : '/api/invoices';
            const res = await fetch(url);
            const invoices = await res.json();
            document.getElementById('inv-count').textContent = invoices.length;
            const tbody = document.getElementById('invoices-body');
            if (invoices.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-row">No invoices found</td></tr>';
            } else {
                tbody.innerHTML = invoices.map(inv => {
                    const downloadBtn = inv.file_path
                        ? `<a href="/download/${inv.file_path.split('/').pop()}" class="btn-sm btn-blue" target="_blank">📥 PDF</a>`
                        : '';
                    const paidBtn = inv.status === 'unpaid'
                        ? `<button class="btn-sm btn-green" onclick="markPaid(${inv.id})">✅ Paid</button>`
                        : '';
                    return `
                        <tr>
                            <td><strong>${inv.invoice_number || 'N/A'}</strong></td>
                            <td>${inv.client_name || '—'}</td>
                            <td>${inv.project_name || '—'}</td>
                            <td class="amount-cell">$${(inv.total_amount || 0).toFixed(2)}</td>
                            <td><span class="badge ${inv.status === 'paid' ? 'badge-green' : 'badge-orange'}">${inv.status}</span></td>
                            <td>${inv.created_at ? new Date(inv.created_at).toLocaleDateString() : '—'}</td>
                            <td class="actions-cell">${downloadBtn} ${paidBtn}</td>
                        </tr>
                    `;
                }).join('');
            }
        }

        function filterInvoices(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            if (btn) btn.classList.add('active');
            loadInvoices(filter);
        }

        async function markPaid(id) {
            if (!confirm('Mark this invoice as paid?')) return;
            await fetch(`/api/invoices/${id}/paid`, { method: 'PUT' });
            loadInvoices(currentFilter);
        }

        loadInvoices('all');

        async function handleLogout() {
            try {
                const response = await fetch('/api/logout', { method: 'POST' });
                if (response.ok) {
                    window.location.href = '/login';
                } else {
                    alert('Logout failed');
                }
            } catch (err) {
                console.error('Logout error:', err);
            }
        }
    </script>
</body>

</html>
