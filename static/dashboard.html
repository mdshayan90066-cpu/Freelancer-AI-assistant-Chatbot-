<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — FreelanceAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/pages.css">
</head>

<body>
    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo"><span class="logo-icon">⚡</span><span class="logo-text">FreelanceAI</span></div>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="nav-link active"><span class="nav-icon">📊</span> Dashboard</a>
            <a href="/chat" class="nav-link"><span class="nav-icon">💬</span> AI Chat</a>
            <a href="/clients" class="nav-link"><span class="nav-icon">👥</span> Clients</a>
            <a href="/payments" class="nav-link"><span class="nav-icon">💰</span> Payments</a>
            <a href="/invoices" class="nav-link"><span class="nav-icon">📋</span> Invoices</a>
            <a href="/receipts" class="nav-link"><span class="nav-icon">🧾</span> Receipts</a>
        </nav>
        <div class="sidebar-footer" style="padding: 20px; border-top: 1px solid var(--border-color); margin-top: auto;">
            <button onclick="handleLogout()" class="btn-sm"
                style="width: 100%; background: transparent; color: var(--text-muted); border: 1px solid var(--border-color); cursor: pointer; padding: 10px; border-radius: 8px;">
                🚪 Logout
            </button>
        </div>
    </aside>
    <main class="page-content">
        <header class="page-header">
            <button class="menu-toggle"
                onclick="document.getElementById('sidebar').classList.toggle('collapsed')">☰</button>
            <h1>Dashboard</h1>
        </header>
        <div class="page-body">
            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card stat-purple">
                    <div class="stat-icon">💰</div>
                    <div class="stat-info">
                        <span class="stat-value" id="total-revenue">$0</span>
                        <span class="stat-label">Total Revenue</span>
                    </div>
                </div>
                <div class="stat-card stat-green">
                    <div class="stat-icon">✅</div>
                    <div class="stat-info">
                        <span class="stat-value" id="paid-revenue">$0</span>
                        <span class="stat-label">Received</span>
                    </div>
                </div>
                <div class="stat-card stat-orange">
                    <div class="stat-icon">⏳</div>
                    <div class="stat-info">
                        <span class="stat-value" id="outstanding-revenue">$0</span>
                        <span class="stat-label">Outstanding</span>
                    </div>
                </div>
                <div class="stat-card stat-blue">
                    <div class="stat-icon">👥</div>
                    <div class="stat-info">
                        <span class="stat-value" id="total-clients">0</span>
                        <span class="stat-label">Clients</span>
                    </div>
                </div>
            </div>

            <!-- Quick Stats Row -->
            <div class="stats-grid stats-grid-3">
                <div class="stat-card stat-small">
                    <span class="stat-label">Unpaid Invoices</span>
                    <span class="stat-value" id="unpaid-count">0</span>
                </div>
                <div class="stat-card stat-small">
                    <span class="stat-label">Total Invoices</span>
                    <span class="stat-value" id="total-invoices">0</span>
                </div>
                <div class="stat-card stat-small">
                    <span class="stat-label">Active Projects</span>
                    <span class="stat-value" id="active-projects">0</span>
                </div>
            </div>

            <!-- Recent Invoices -->
            <div class="card">
                <div class="card-header">
                    <h2>Recent Invoices</h2>
                    <a href="/invoices" class="btn-link">View All →</a>
                </div>
                <div class="table-wrap">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Invoice #</th>
                                <th>Client</th>
                                <th>Amount</th>
                                <th>Status</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody id="recent-invoices-body">
                            <tr>
                                <td colspan="5" class="empty-row">No invoices yet</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
    <script>
        async function loadDashboard() {
            try {
                const [statsRes, invRes] = await Promise.all([
                    fetch('/api/stats'), fetch('/api/invoices')
                ]);
                const stats = await statsRes.json();
                const invoices = await invRes.json();

                document.getElementById('total-revenue').textContent = `$${(stats.total_revenue || 0).toFixed(2)}`;
                document.getElementById('paid-revenue').textContent = `$${(stats.paid_revenue || 0).toFixed(2)}`;
                document.getElementById('outstanding-revenue').textContent = `$${(stats.outstanding_revenue || 0).toFixed(2)}`;
                document.getElementById('total-clients').textContent = stats.total_clients || 0;
                document.getElementById('unpaid-count').textContent = stats.unpaid_invoices || 0;
                document.getElementById('total-invoices').textContent = stats.total_invoices || 0;
                document.getElementById('active-projects').textContent = stats.active_projects || 0;

                const tbody = document.getElementById('recent-invoices-body');
                if (invoices.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="empty-row">No invoices yet</td></tr>';
                } else {
                    tbody.innerHTML = invoices.slice(0, 8).map(inv => `
                        <tr>
                            <td><strong>${inv.invoice_number || 'N/A'}</strong></td>
                            <td>${inv.client_name || '—'}</td>
                            <td>$${(inv.total_amount || 0).toFixed(2)}</td>
                            <td><span class="badge ${inv.status === 'paid' ? 'badge-green' : 'badge-orange'}">${inv.status}</span></td>
                            <td>${inv.created_at ? new Date(inv.created_at).toLocaleDateString() : '—'}</td>
                        </tr>
                    `).join('');
                }
            } catch (e) { console.error('Dashboard load error:', e); }
        }
        loadDashboard();

        async function handleLogout() {
            try {
                const response = await fetch('/api/logout', { method: 'POST' });
                if (response.ok) {
                    window.location.href = '/login';
                } else {
                    alert('Logout failed');
                }
            } catch (err) {
                console.error('Logout error:', err);
            }
        }
    </script>
</body>

</html>
